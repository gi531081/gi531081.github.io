<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <link rel="icon" href="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fbootflare.com%2Fwp-content%2Fuploads%2F2023%2F03%2FGoogle-Classroom-Logo2-1536x1326.png&f=1&nofb=1&ipt=e7998836331ab23917d222616b145a9ef81400d5a6bff5b5047288faaaa395a8">
    <style>
        :root { --bg-dark: #050506; --text-main: #f5f5f7; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #1a1a22 0%, #050506 100%); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; color: var(--text-main); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #cloak-screen { text-align: center; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .brand-text { font-size: 5rem; font-weight: 900; margin-bottom: 20px; letter-spacing: -3px; background: linear-gradient(to bottom, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; width: 320px; text-align: center; }
        input.glass-input { background: rgba(255,255,255,0.05); color: #fff; padding: 15px; border-radius: 15px; width: 100%; margin: 20px 0; text-align: center; border: none !important; outline: none; }
        .cloak-btn { border: none; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); color: #fff; padding: 22px 50px; border-radius: 50px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .emoji-particle { position: absolute; pointer-events: none; font-size: 2rem; z-index: 1; left: 50%; top: 50%; animation: float-around 3s linear forwards; }
        @keyframes float-around { 0% { transform: translate(-50%, -50%); opacity: 0; } 15% { opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)); opacity: 0; } }
    </style>
</head>
<body>

    <div id="cloak-screen">
        <h1 class="brand-text">CHILLIN'</h1>
        <button class="cloak-btn" onclick="showPassModal()">My Latest And Greatest</button>
    </div>

    <div id="passModal" class="glass-modal">
        <div class="modal-content">
            <h2 style="margin:0; font-weight:900;">Whoa. Not So Fast.</h2>
            <input type="password" id="passInput" class="glass-input" placeholder="Type The Super Secret Passcode...">
            <button class="cloak-btn" style="border: 1pt solid white !important; padding: 15px 30px; font-size: 0.8rem;" onclick="verifyPass()">Click Me</button>
            <p id="passError" style="color: #ff4b4b; font-size: 0.7rem; margin-top: 15px; display: none;">Sorry buddy. That passcode isn't right. If you don't know it talk to me.</p>
        </div>
    </div>

    <script>
        function spawnEmoji() {
            const el = document.createElement('div'); el.className = 'emoji-particle';
            el.innerText = ["🐉", "🦁", "😎"][Math.floor(Math.random() * 3)];
            el.style.setProperty('--tx', (Math.random() - 0.5) * 800 + 'px');
            el.style.setProperty('--ty', (Math.random() - 0.5) * 800 + 'px');
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
        setInterval(spawnEmoji, 150);

        function showPassModal() { document.getElementById('passModal').style.display = 'flex'; }
        function verifyPass() {
            if (document.getElementById('passInput').value === "bored@hcc") { cloakAndLaunch(); }
            else { document.getElementById('passError').style.display = 'block'; }
        }

        const mainframeContent = `
<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/gn-math/gn-math.github.io@main/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"><\/script>
    <script src="https://unpkg.com/lucide@latest"><\/script>
    <style>
        :root { --bg-dark: #050506; --panel-bg: rgba(255, 255, 255, 0.05); --text-main: #f5f5f7; --glass-blur: blur(40px) saturate(150%); --radius-lg: 20px; --radius-md: 12px; }
        * { box-sizing: border-box; outline: none; border: none !important; -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin: 0; padding: 12px; background: radial-gradient(circle at center, #1a1a22 0%, #050506 100%); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; gap: 12px; }
        
        #nav-sidebar { width: 110px; background: var(--panel-bg); backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 16px; z-index: 7000; user-select: none; }
        .nav-icon { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: #a1a1aa; background: rgba(255, 255, 255, 0.03); pointer-events: auto; }
        .nav-icon.active { background: rgba(255, 255, 255, 0.1); color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.05); }

        #main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; z-index: 2; overflow: hidden; border-radius: var(--radius-lg); }
        header { background: rgba(10, 10, 12, 0.7); backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); padding: 0 30px; height: 84px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; left: 0; right: 0; z-index: 5000; }
        #content-scroll { flex: 1; overflow-y: auto; padding: 100px 10px 20px 10px; position: relative; }

        #container, #sections-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .zone-item, .ugs-card { background: rgba(255, 255, 255, 0.05) !important; border-radius: var(--radius-md) !important; overflow: hidden; aspect-ratio: 1/1; cursor: pointer; transition: 0.3s; position: relative; display: block; border: 1px solid rgba(255,255,255,0.05) !important; }
        .zone-item:hover, .ugs-card:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.1) !important; border-color: #fff !important; }
        .zone-item img { width: 100%; height: 100%; object-fit: cover; }
        .game-title { position: absolute; bottom: 0; width: 100%; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-size: 0.75rem; font-weight: 700; text-align: center; color: white; }

        #ugs-wrapper select, #ugs-wrapper input { background: rgba(255,255,255,0.05) !important; color: #fff !important; border: 1px solid rgba(255,255,255,0.1) !important; padding: 15px 25px !important; border-radius: 12px !important; font-size: 0.9rem !important; backdrop-filter: blur(10px); margin-bottom: 20px; width: 100%; }

        #zoneViewer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 6000; display: none; flex-direction: column; border-radius: var(--radius-lg); overflow: hidden; }
        iframe { flex: 1; background: #fff; width: 100%; height: 100%; border: none; }

        #chat-sidebar { width: 300px; background: var(--panel-bg); backdrop-filter: var(--glass-blur); border-radius: var(--radius-lg); display: flex; flex-direction: column; z-index: 10; position: relative; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { background: rgba(255, 255, 255, 0.05); padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; border-left: none !important; }
        #nick-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-radius: var(--radius-lg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }

        .loading-wrap { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; gap: 15px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .random-btn { color: white; background: rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav id="nav-sidebar">
        <div class="nav-icon active" id="nav-gn" onclick="switchToGN()"><i data-lucide="gamepad-2"></i></div>
        <div class="nav-icon" id="nav-ugs" onclick="switchToUGS()"><i data-lucide="swords"></i></div>
        <div class="nav-icon" id="nav-proxy" onclick="launchProxy()"><i data-lucide="search"></i></div>
    </nav>

    <div id="main-wrapper">
        <header>
            <div style="font-size: 1.6rem; font-weight: 900;">Chillin'</div>
            <div style="background: rgba(0, 0, 0, 0.4); border-radius: var(--radius-md); padding: 12px 20px; display: flex; align-items: center; width: 35%;">
                <i data-lucide="search" style="width: 18px; color: #666;"></i>
                <input type="text" id="searchBar" placeholder="Search ALL The Games..." oninput="unifiedSearch()" style="background: transparent; color: white; width: 100%; margin-left: 10px; border:none; outline:none;">
            </div>
            <button class="random-btn" onclick="playRandomGame()"><i data-lucide="shuffle"></i> Random Game</button>
        </header>
        <div id="content-scroll">
            <div id="container"></div>
            <div id="ugs-loader" class="loading-wrap"><div class="spinner"></div><p>Pls be patient buddy.</p></div>
        </div>
        <div id="zoneViewer">
            <div style="height: 64px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: #0a0a0c;">
                <span id="zoneName" style="font-weight: 800; color: #fff;">Patience...</span>
                <div style="display:flex; gap:12px;">
                    <button style="background:rgba(255,255,255,0.1); color: #fff; padding: 10px 20px; border-radius: 10px; cursor:pointer;" onclick="toggleFullscreen()"><i data-lucide="fullscreen"></i></button>
                    <button style="background:#ff4b4b; color: #fff; padding: 10px 20px; border-radius: 10px; cursor:pointer;" onclick="closeZone()"><i data-lucide="circle-x"></i></button>
                </div>
            </div>
            <iframe id="zoneFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
    </div>

    <aside id="chat-sidebar">
        <div id="nick-overlay">
            <div style="font-weight: 800; margin-bottom: 10px;">What's Your Name</div>
            <input type="text" id="nickInput" style="background:#111; color:#fff; padding:10px; width:80%; margin-bottom:10px; text-align:center;">
            <button onclick="setNickname()" style="background:#fff; padding:10px 20px; border-radius:5px; font-weight:800; cursor:pointer; color:#000;">Chat</button>
        </div>
        <div style="padding: 24px; font-weight: 800; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between;">
            Online Chat <span id="chat-status" style="color:#ff4b4b">●</span>
        </div>
        <div id="chat-messages"></div>
        <div style="padding: 15px;"><input type="text" id="chatInput" placeholder="Text Everyone..." style="width: 100%; padding: 14px; border-radius: 10px; background: #000; color: #fff;"></div>
    </aside>

    <script>
        lucide.createIcons();
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        let nickname = localStorage.getItem('chat_nick');
        
        client.on('connect', () => {
            document.getElementById('chat-status').style.color = '#00ff00';
            client.subscribe('chillin/global/chat/v4');
        });

        client.on('message', (topic, payload) => {
            try {
                const data = JSON.parse(payload.toString());
                const box = document.getElementById('chat-messages');
                const el = document.createElement('div');
                el.className = 'msg-bubble';
                el.innerHTML = \`<div style="color:#fff; font-size:0.7rem; font-weight:800;">\${data.user}</div>\${data.msg}\`;
                box.appendChild(el); box.scrollTop = box.scrollHeight;
            } catch(e) {}
        });

        function setNickname() {
            const v = document.getElementById('nickInput').value.trim();
            if(v) { nickname = v; localStorage.setItem('chat_nick', v); document.getElementById('nick-overlay').style.display='none'; }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value.trim()) {
                if(!nickname) document.getElementById('nick-overlay').style.display='flex';
                else { client.publish('chillin/global/chat/v4', JSON.stringify({user: nickname, msg: e.target.value})); e.target.value=''; }
            }
        });

        let currentMode = 'GN'; 
        const zonesURL = "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json";
        const coverURL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
        const htmlURL = "https://cdn.jsdelivr.net/gh/gn-math/html@main";
        let zones = [];

        function playRandomGame() {
            if (currentMode === 'GN') {
                if (zones.length > 0) {
                    const randomGame = zones[Math.floor(Math.random() * zones.length)];
                    openZone(randomGame);
                }
            } else if (currentMode === 'UGS') {
                const ugsGames = document.querySelectorAll('.ugs-card');
                if (ugsGames.length > 0) {
                    const randomIdx = Math.floor(Math.random() * ugsGames.length);
                    ugsGames[randomIdx].click();
                }
            }
        }

        function switchToUGS() {
            closeZone(); currentMode = 'UGS';
            setActiveNav('nav-ugs');
            document.getElementById('container').innerHTML = '';
            document.getElementById('ugs-loader').style.display = 'flex';
            
            const content = document.getElementById('content-scroll');
            let ugsContainer = document.getElementById('ugs-wrapper');
            if(!ugsContainer) {
                ugsContainer = document.createElement('div');
                ugsContainer.id = 'ugs-wrapper';
                ugsContainer.innerHTML = '<div id="sections-container"></div>';
                content.appendChild(ugsContainer);
            }
            ugsContainer.style.display = 'block';

            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/games.js';
            s.onload = () => {
                document.getElementById('ugs-loader').style.display = 'none';
                
                // Hide the original UGS search bar to use ours
                const checkSearch = setInterval(() => {
                   const internalSearch = document.querySelector('#ugs-wrapper input[type="text"]');
                   if(internalSearch) {
                       internalSearch.style.display = 'none';
                       clearInterval(checkSearch);
                   }
                }, 100);

                const observer = new MutationObserver(() => {
                    document.querySelectorAll('#sections-container > div').forEach(card => {
                        if (!card.classList.contains('ugs-card')) {
                            card.className = 'ugs-card';
                            const title = card.innerText;
                            card.innerHTML = \`<div class="game-title">\${title}</div>\`;
                            card.onclick = () => {
                                card.dispatchEvent(new MouseEvent('click', {bubbles: true}));
                            }
                        }
                    });
                });
                observer.observe(document.getElementById('sections-container'), { childList: true });
            };
            document.body.appendChild(s);
        }

        function switchToGN() {
            closeZone(); currentMode = 'GN';
            setActiveNav('nav-gn');
            const wrapper = document.getElementById('ugs-wrapper');
            if(wrapper) wrapper.style.display = 'none';
            document.getElementById('container').innerHTML = '';
            displayZones(zones);
        }

        function unifiedSearch() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            if (currentMode === 'GN') {
                displayZones(zones.filter(z => z.name.toLowerCase().includes(term)));
            } else {
                // Pass the search query to the hidden UGS input
                const internalSearch = document.querySelector('#ugs-wrapper input[type="text"]');
                if (internalSearch) {
                    internalSearch.value = term;
                    internalSearch.dispatchEvent(new Event('input', { bubbles: true }));
                }
            }
        }

        function displayZones(data) {
            const container = document.getElementById('container');
            if(!container) return; container.innerHTML = "";
            data.forEach(game => {
                const item = document.createElement('div');
                item.className = 'zone-item';
                item.onclick = () => openZone(game);
                item.innerHTML = \`<img src="\${game.cover.replace("{COVER_URL}", coverURL)}"><div class="game-title">\${game.name}</div>\`;
                container.appendChild(item);
            });
        }

        function openZone(game) {
            document.getElementById('zoneViewer').style.display = "flex";
            document.getElementById('zoneName').textContent = game.name.toUpperCase();
            fetch(game.url.replace("{HTML_URL}", htmlURL)).then(r => r.text()).then(html => {
                const doc = document.getElementById('zoneFrame').contentDocument;
                doc.open(); doc.write(html); doc.close();
            });
        }

        function launchProxy() {
            setActiveNav('nav-proxy');
            document.getElementById('zoneViewer').style.display = "flex";
            document.getElementById('zoneName').textContent = "Everything Unbl0cked 😍";
            document.getElementById('zoneFrame').src = "https://h2o.polden21vek.com/";
        }

        function closeZone() {
            document.getElementById('zoneViewer').style.display = "none";
            document.getElementById('zoneFrame').src = "about:blank";
            if(document.getElementById('nav-proxy').classList.contains('active')) setActiveNav('nav-gn');
        }

        function setActiveNav(id) {
            document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function init() {
            try {
                const res = await fetch(zonesURL + "?t=" + Date.now());
                zones = await res.json();
                displayZones(zones);
            } catch(e) {}
        }
        
        function toggleFullscreen() {
            const el = document.getElementById('zoneFrame');
            if (el.requestFullscreen) el.requestFullscreen();
        }

        init();
    <\/script>
</body>
</html>`;

        function cloakAndLaunch() {
            const win = window.open("about:blank", "_blank");
            if (!win) { document.getElementById('passError').innerText = "POPUP BLOCKED"; return; }
            win.document.write(mainframeContent);
            win.document.close();
            window.location.replace("https://classroom.google.com");
        }
    </script>
</body>
</html>
